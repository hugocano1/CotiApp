<svg width="280" height="100" viewBox="0 0 280 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap');
    </style>
  </defs>
  <style>
    .bg {
      fill: #FFFFFF; /* White background */
    }
    .symbol {
      fill: #00D2A0; /* Neon Mint Green */
    }
    .text {
      font-family: 'Poppins', 'Arial Black', 'Futura', sans-serif;
      font-size: 60px;
      font-weight: 700;
      fill: #1A1D2B; /* Dark Navy */
      letter-spacing: 1.5px;
      text-anchor: start;
    }
  </style>

  <rect width="280" height="100" class="bg" />

  <!-- Abstract "L" symbol (downward arrow/bolt) -->
  <g transform="translate(15, 10) scale(0.8)">
    <path class="symbol" d="M 20 10 L 20 65 L 45 90 L 80 90 L 80 75 L 50 75 L 20 45 L 20 10 Z" />
  </g>

  <!-- App Name "LIZI" -->
  <text x="100" y="75" class="text">LIZI</text>

</svg>
